<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2k! REBBON SENSI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    min-height: 100vh;
    padding: 25px 20px;
    background: radial-gradient(circle at top right, #003311 0%, #000 50%);
  }
  
  /* Top header */
  .top-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 50px;
  }
  
  .logo {
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88;
    line-height: 1.2;
  }
  
  .logo-btn {
    background: #00ff88;
    border: none;
    color: black;
    padding: 12px 30px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 0 20px #00ff88;
  }
  
  /* Main title */
  .main-title {
    text-align: center;
    font-size: 38px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 25px white;
    margin-bottom: 5px;
  }
  
  .pro-sub {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    color: #00ff88;
    font-style: italic;
    margin-bottom: 25px;
    text-shadow: 0 0 10px #00ff88;
  }
  
  /* Brand name */
  .brand-name {
    text-align: center;
    font-size: 32px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    margin-bottom: 20px;
  }
  
  /* Description */
  .description {
    text-align: center;
    font-size: 16px;
    line-height: 1.6;
    color: #ccc;
    max-width: 380px;
    margin: 0 auto 35px;
    padding: 0 10px;
  }
  
  /* Search box */
  .input-container {
    max-width: 400px;
    margin: 0 auto;
  }
  
  input[type="text"] {
    width: 100%;
    padding: 18px 20px;
    background: #0a0a0a;
    border: 2px solid #00ff88;
    border-radius: 15px;
    color: white;
    font-size: 18px;
    outline: none;
    box-shadow: 0 0 15px rgba(0,255,136,0.3);
  }
  
  input::placeholder {
    color: #555;
  }
  
  input:focus {
    box-shadow: 0 0 30px #00ff88;
  }
  
  /* Phone items */
  .phone-item {
    background: #0a0a0a;
    border: 2px solid #00ff88;
    border-radius: 15px;
    padding: 18px 20px;
    margin-bottom: 12px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,255,136,0.2);
    transition: 0.3s;
  }
  
  .phone-item:active {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 30px #00ff88;
    transform: scale(0.98);
  }
  
  .footer {
    text-align: center;
    margin-top: 50px;
    color: #444;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- Top header - 2K! KINGDOM sensi -->
<div class="top-header">
  <div class="logo">2K! KINGDOM<br>SENSI</div>
  <button class="logo-btn">2K! REBBORN</button>
</div>

<!-- Main content -->
<h1 class="main-title">BECOME PRO</h1>
<p class="pro-sub">WITH 2K! REBBORN</p>
<h2 class="brand-name">2k! REBBON SENSI</h2>

<!-- Description -->
<p class="description">
  Unlock powerful Free Fire sensitivity settings, improve your aim, master headshots and become a stronger player using unlimited sensitivity recommendations from Nigeria's gaming creator, 2K! REBBORN.
</p>

<!-- Search box only -->
<div class="input-container">
  <input type="text" id="searchInput" placeholder="Search device">
  <div id="resultsList" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div>
</div>

<div class="footer">🔒 2krebborn.github.io</div>

<script>
const phoneDatabase = [
  "iPhone 16 Pro Max",
  "iPhone 16 Pro", 
  "iPhone 15 Pro Max",
  "Samsung Galaxy S24 Ultra",
  "Samsung A54",
  "Tecno Spark 20",
  "Infinix Note 40",
  "Redmi Note 13"
];

const searchInput = document.getElementById('searchInput');
const resultsList = document.getElementById('resultsList');

searchInput.addEventListener('input', function() {
  const searchTerm = this.value.toLowerCase().trim();
  
  if(searchTerm === '') {
    resultsList.innerHTML = '';
    return;
  }
  
  const filtered = phoneDatabase.filter(phone => 
    phone.toLowerCase().includes(searchTerm)
  );
  
  if(filtered.length > 0) {
    resultsList.innerHTML = filtered.map(phone => 
      `<div class="phone-item" onclick="selectPhone('${phone}')">${phone}</div>`
    ).join('');
  } else {
    resultsList.innerHTML = `<p style="text-align:center; color:#666; padding:20px;">No device found</p>`;
  }
});

function selectPhone(phoneName) {
  function randomSens() {
    return Math.floor(Math.random() * 151) + 50;
  }
  
  const settings = {
    General: randomSens(),
    RedDot: randomSens(),
    Scope2x: randomSens(),
    Scope4x: randomSens(),
    Sniper: randomSens(),
    FreeCamera: randomSens()
  };
  
  resultsList.innerHTML = `
    <h3 style="color:#00ff88; text-align:center; margin-bottom:20px; text-shadow:0 0 10px #00ff88;">
      ${phoneName.toUpperCase()} - UNLIMITED 🔥
    </h3>
    <div>
      <div class="phone-item"><b>General:</b> ${settings.General}</div>
      <div class="phone-item"><b>Red Dot:</b> ${settings.RedDot}</div>
      <div class="phone-item"><b>2x Scope:</b> ${settings.Scope2x}</div>
      <div class="phone-item"><b>4x Scope:</b> ${settings.Scope4x}</div>
      <div class="phone-item"><b>Sniper:</b> ${settings.Sniper}</div>
      <div class="phone-item"><b>Free Camera:</b> ${settings.FreeCamera}</div>
    </div>
    <button class="phone-item" style="margin-top:20px; text-align:center; width:100%;" onclick="location.reload()">Search New Device</button>
  `;
}
</script>

</body>
</html>
